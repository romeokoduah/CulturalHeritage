<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0b1020" />
    <meta name="description" content="HeritageQuest — explore, preserve and reimagine the world's living cultural heritage through an interactive globe and AI storytelling." />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="HeritageQuest" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Inter:wght@400;500;600&family=Press+Start+2P&display=swap" rel="stylesheet" />
    <title>HeritageQuest · AI for Cultural Heritage</title>
    <script>
      // Apply the saved (or system) theme before first paint to avoid a flash.
      (function () {
        try {
          var s = localStorage.getItem('heritagequest.theme')
          var light =
            s === 'light' ||
            (!s && window.matchMedia('(prefers-color-scheme: light)').matches)
          if (light) document.documentElement.classList.add('light')
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
